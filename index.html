<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #2a2a2a; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        button { 
            background: #3498db; border: none; color: white; padding: 15px 30px; 
            border-radius: 10px; font-size: 16px; margin: 10px; width: 80%; cursor: pointer;
        }
        button.danger { background: #e74c3c; }
        h2 { color: #3498db; }
    </style>
</head>
<body>
    <h2>☁️ ADMIN PANEL</h2>
    <div class="card">
        <p>Управление сервером CS 1.6</p>
        <button onclick="send('sv_restart 1')">🔄 Рестарт раунда</button>
        <button onclick="send('status')">📊 Статус игроков</button>
        <button onclick="send('amx_mapmenu')">🗺 Меню карт</button>
    </div>
    <div class="card">
        <button class="danger" onclick="send('quit')">⚠️ Выключить (RCON)</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function send(cmd) {
            tg.sendData(cmd); // Отправляет команду боту
        }
    </script>
</body>
</html>
